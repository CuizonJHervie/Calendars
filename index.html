<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Year Calendar</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>2026 Calendar</h1>

<div class="calendar">

    <!-- Repeat this block for all 12 months -->
    
    <div class="month">
        <h2>January</h2>
        <div class="days">
            <div>Sun</div><div>Mon</div><div>Tue</div>
            <div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>

            <!-- Dates -->
            <div></div><div></div><div></div>
            <div>1</div><div>2</div><div>3</div><div>4</div>
            <div>5</div><div>6</div><div>7</div><div>8</div><div>9</div><div>10</div><div>11</div>
            <div>12</div><div>13</div><div>14</div><div>15</div><div>16</div><div>17</div><div>18</div>
            <div>19</div><div>20</div><div>21</div><div>22</div><div>23</div><div>24</div><div>25</div>
            <div>26</div><div>27</div><div>28</div><div>29</div><div>30</div><div>31</div>
        </div>
    </div>

    <!-- COPY & EDIT FOR OTHER MONTHS -->

    <div class="month">
        <h2>February</h2>
        <div class="days">
            <div>Sun</div><div>Mon</div><div>Tue</div>
            <div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>

            <!-- Adjust blanks & dates -->
            <div></div><div></div><div></div><div></div>
            <div>1</div><div>2</div><div>3</div>
            <div>4</div><div>5</div><div>6</div><div>7</div><div>8</div><div>9</div><div>10</div>
            <div>11</div><div>12</div><div>13</div><div>14</div><div>15</div><div>16</div><div>17</div>
            <div>18</div><div>19</div><div>20</div><div>21</div><div>22</div><div>23</div><div>24</div>
            <div>25</div><div>26</div><div>27</div><div>28</div>
        </div>
    </div>

    <!-- Continue for all months up to December -->

</div>

</body>
</html>
