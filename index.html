<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2026 Full Calendar</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>📅 Calendar 2026</h1>

<div id="calendar"></div>

<script>
const calendar = document.getElementById("calendar");

const months = [
    "January","February","March","April","May","June",
    "July","August","September","October","November","December"
];

const year = 2026;

months.forEach((month, index) => {

    const monthDiv = document.createElement("div");
    monthDiv.classList.add("month");

    const title = document.createElement("h2");
    title.innerText = month;
    monthDiv.appendChild(title);

    const daysDiv = document.createElement("div");
    daysDiv.classList.add("days");

    const daysOfWeek = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

    // Add day labels
    daysOfWeek.forEach(day => {
        const dayEl = document.createElement("div");
        dayEl.classList.add("day-name");
        dayEl.innerText = day;
        daysDiv.appendChild(dayEl);
    });

    // First day of month
    const firstDay = new Date(year, index, 1).getDay();

    // Number of days
    const totalDays = new Date(year, index + 1, 0).getDate();

    // Empty spaces
    for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement("div");
        daysDiv.appendChild(empty);
    }

    // Actual days
    for (let day = 1; day <= totalDays; day++) {
        const date = document.createElement("div");
        date.classList.add("date");
        date.innerText = day;
        daysDiv.appendChild(date);
    }

    monthDiv.appendChild(daysDiv);
    calendar.appendChild(monthDiv);
});
</script>

</body>
</html>
